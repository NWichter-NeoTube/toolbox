# Secrets Management: Infisical

services:
  # ───────────────────────────────────────────────
  # Infisical (secrets manager)
  # ───────────────────────────────────────────────
  infisical:
    image: infisical/infisical:latest
    container_name: toolbox-infisical
    restart: unless-stopped
    environment:
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:?INFISICAL_ENCRYPTION_KEY is required}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:?INFISICAL_AUTH_SECRET is required}
      DB_CONNECTION_URI: postgres://${POSTGRES_USER:-toolbox}:${POSTGRES_PASSWORD}@postgres:5432/infisical
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      SITE_URL: ${INFISICAL_URL:-https://infisical.example.com}
      # Telemetry
      TELEMETRY_ENABLED: "false"
    networks:
      - toolbox
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

networks:
  toolbox:
    external: true
    name: toolbox
