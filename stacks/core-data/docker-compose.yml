# Core data services: PostgreSQL, Redis, MinIO
# These are shared infrastructure — other stacks depend on them.

services:
  # ───────────────────────────────────────────────
  # PostgreSQL 16
  # ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: toolbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-toolbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-toolbox}
      # Additional databases are created by the init script
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - toolbox
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-toolbox}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No ports exposed — access via Docker network only.
    # Coolify will NOT route to this; it's internal.

  # ───────────────────────────────────────────────
  # Redis 7
  # ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: toolbox-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - toolbox
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ───────────────────────────────────────────────
  # MinIO (S3-compatible object storage)
  # ───────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: toolbox-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://minio-console.example.com}
    volumes:
      - minio_data:/data
    networks:
      - toolbox
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Port 9000 = S3 API (internal), Port 9001 = Console UI (routed by Coolify)

volumes:
  postgres_data:
    name: toolbox_postgres_data
  redis_data:
    name: toolbox_redis_data
  minio_data:
    name: toolbox_minio_data

networks:
  toolbox:
    external: true
    name: toolbox
