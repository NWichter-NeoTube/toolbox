# Analytics: PostHog (self-hosted)
# PostHog requires Postgres, Redis, ClickHouse, Kafka, and object storage.
# We use the shared Postgres/Redis from 10-core-data and add
# ClickHouse + Kafka as PostHog-specific dependencies here.

services:
  # ───────────────────────────────────────────────
  # ClickHouse (PostHog event storage)
  # ───────────────────────────────────────────────
  posthog-clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    container_name: toolbox-posthog-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: posthog
      CLICKHOUSE_USER: ${POSTHOG_CLICKHOUSE_USER:-posthog}
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD:?POSTHOG_CLICKHOUSE_PASSWORD is required}
    volumes:
      - posthog_clickhouse_data:/var/lib/clickhouse
      - posthog_clickhouse_logs:/var/log/clickhouse-server
    networks:
      - toolbox
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ───────────────────────────────────────────────
  # Kafka (PostHog event ingestion)
  # ───────────────────────────────────────────────
  posthog-kafka:
    image: bitnami/kafka:3.7
    container_name: toolbox-posthog-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@posthog-kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://posthog-kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LOG_RETENTION_HOURS: 24
      KAFKA_CFG_LOG_RETENTION_BYTES: 1073741824
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - posthog_kafka_data:/bitnami/kafka
    networks:
      - toolbox
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ───────────────────────────────────────────────
  # Zookeeper — removed: using KRaft mode above
  # ───────────────────────────────────────────────

  # ───────────────────────────────────────────────
  # PostHog
  # ───────────────────────────────────────────────
  posthog:
    image: posthog/posthog:latest
    container_name: toolbox-posthog
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-toolbox}:${POSTGRES_PASSWORD}@postgres:5432/posthog
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_USER: ${POSTHOG_CLICKHOUSE_USER:-posthog}
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_SECURE: "false"
      KAFKA_HOSTS: posthog-kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET_KEY:?POSTHOG_SECRET_KEY is required}
      SITE_URL: ${POSTHOG_URL:-https://posthog.example.com}
      IS_BEHIND_PROXY: "true"
      TRUST_ALL_PROXIES: "true"
      DISABLE_SECURE_SSL_REDIRECT: "true"
      # Cookie-consent-aware / DSGVO: PostHog supports cookieless mode.
      # Configure in PostHog project settings or via JS snippet:
      #   posthog.init('<key>', { persistence: 'memory' })
      # This avoids cookies entirely until consent is given.
    networks:
      - toolbox
    depends_on:
      posthog-clickhouse:
        condition: service_healthy
      posthog-kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/_health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ───────────────────────────────────────────────
  # PostHog Worker (async tasks)
  # ───────────────────────────────────────────────
  posthog-worker:
    image: posthog/posthog:latest
    container_name: toolbox-posthog-worker
    restart: unless-stopped
    command: ./bin/docker-worker-celery --with-scheduler
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-toolbox}:${POSTGRES_PASSWORD}@postgres:5432/posthog
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_USER: ${POSTHOG_CLICKHOUSE_USER:-posthog}
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_SECURE: "false"
      KAFKA_HOSTS: posthog-kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
      SITE_URL: ${POSTHOG_URL:-https://posthog.example.com}
      IS_BEHIND_PROXY: "true"
    networks:
      - toolbox
    depends_on:
      posthog-clickhouse:
        condition: service_healthy
      posthog-kafka:
        condition: service_healthy

  # ───────────────────────────────────────────────
  # PostHog Plugins (data pipeline)
  # ───────────────────────────────────────────────
  posthog-plugins:
    image: posthog/posthog:latest
    container_name: toolbox-posthog-plugins
    restart: unless-stopped
    command: ./bin/plugin-server --no-restart-loop
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-toolbox}:${POSTGRES_PASSWORD}@postgres:5432/posthog
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CLICKHOUSE_HOST: posthog-clickhouse
      CLICKHOUSE_DATABASE: posthog
      CLICKHOUSE_USER: ${POSTHOG_CLICKHOUSE_USER:-posthog}
      CLICKHOUSE_PASSWORD: ${POSTHOG_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_SECURE: "false"
      KAFKA_HOSTS: posthog-kafka:9092
      SECRET_KEY: ${POSTHOG_SECRET_KEY}
    networks:
      - toolbox
    depends_on:
      posthog-clickhouse:
        condition: service_healthy
      posthog-kafka:
        condition: service_healthy

volumes:
  posthog_clickhouse_data:
    name: toolbox_posthog_clickhouse_data
  posthog_clickhouse_logs:
    name: toolbox_posthog_clickhouse_logs
  posthog_kafka_data:
    name: toolbox_posthog_kafka_data

networks:
  toolbox:
    external: true
    name: toolbox
