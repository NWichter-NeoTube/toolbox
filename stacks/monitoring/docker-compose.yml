# Monitoring: Uptime Kuma

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: toolbox-uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - toolbox
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');const r=http.get('http://localhost:3001/api/status-page/heartbeat',res=>{process.exit(res.statusCode===200?0:1)});r.on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  uptime_kuma_data:
    name: toolbox_uptime_kuma_data

networks:
  toolbox:
    external: true
    name: toolbox
