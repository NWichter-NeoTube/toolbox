# Observability stack: Prometheus, Grafana, Loki, Tempo, Alertmanager

services:
  # ───────────────────────────────────────────────
  # Prometheus
  # ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: toolbox-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./configs/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - toolbox
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ───────────────────────────────────────────────
  # Grafana
  # ───────────────────────────────────────────────
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: toolbox-grafana
    restart: unless-stopped
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: ${POSTGRES_USER:-toolbox}
      GF_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-https://grafana.example.com}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_DISABLE_LOGIN_FORM: "false"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - toolbox
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ───────────────────────────────────────────────
  # Loki (log aggregation)
  # ───────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    container_name: toolbox-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./configs/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - toolbox
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ───────────────────────────────────────────────
  # Tempo (distributed tracing)
  # ───────────────────────────────────────────────
  tempo:
    image: grafana/tempo:2.5.0
    container_name: toolbox-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    volumes:
      - ./configs/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    networks:
      - toolbox
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3200/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ───────────────────────────────────────────────
  # Alertmanager
  # ───────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: toolbox-alertmanager
    restart: unless-stopped
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./configs/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - toolbox
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  prometheus_data:
    name: toolbox_prometheus_data
  grafana_data:
    name: toolbox_grafana_data
  loki_data:
    name: toolbox_loki_data
  tempo_data:
    name: toolbox_tempo_data
  alertmanager_data:
    name: toolbox_alertmanager_data

networks:
  toolbox:
    external: true
    name: toolbox
