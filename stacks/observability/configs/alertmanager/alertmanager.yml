global:
  resolve_timeout: 5m
  # Uncomment and configure for email alerts:
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@example.com'
  # smtp_auth_username: 'alerts@example.com'
  # smtp_auth_password: 'CHANGE_ME'
  # smtp_require_tls: true

route:
  group_by: ["alertname", "job"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default"

  routes:
    - match:
        severity: critical
      receiver: "critical"
      repeat_interval: 1h

receivers:
  - name: "default"
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    #     channel: "#alerts"
    #     send_resolved: true

  - name: "critical"
    # Uncomment for Slack:
    # slack_configs:
    #   - api_url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
    #     channel: "#alerts-critical"
    #     send_resolved: true

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "instance"]
