groups:
  - name: infrastructure
    rules:
      # ── Instance down ──────────────────────
      - alert: InstanceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 2 minutes."

      # ── High memory usage ──────────────────
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 90% for 5 minutes."

      # ── High disk usage ────────────────────
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage is above 85%."

  - name: services
    rules:
      # ── PostgreSQL down ────────────────────
      - alert: PostgresDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"

      # ── Redis down ─────────────────────────
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"

      # ── Loki ingestion errors ──────────────
      - alert: LokiIngestionErrors
        expr: rate(loki_distributor_lines_received_total[5m]) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Loki is not receiving any logs"
