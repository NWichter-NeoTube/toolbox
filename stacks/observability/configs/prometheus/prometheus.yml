global:
  scrape_interval: 30s
  evaluation_interval: 30s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  # ── Prometheus itself ──────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ── Grafana ────────────────────────────────
  - job_name: "grafana"
    static_configs:
      - targets: ["grafana:3000"]

  # ── Loki ───────────────────────────────────
  - job_name: "loki"
    static_configs:
      - targets: ["loki:3100"]

  # ── Tempo ──────────────────────────────────
  - job_name: "tempo"
    static_configs:
      - targets: ["tempo:3200"]

  # ── MinIO ──────────────────────────────────
  - job_name: "minio"
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]

  # ── PostgreSQL (requires postgres_exporter sidecar — optional) ──
  # - job_name: "postgres"
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # ── Redis (requires redis_exporter sidecar — optional) ──
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # ── Meilisearch ────────────────────────────
  - job_name: "meilisearch"
    static_configs:
      - targets: ["meilisearch:7700"]
    metrics_path: /metrics

  # ── Qdrant ─────────────────────────────────
  - job_name: "qdrant"
    static_configs:
      - targets: ["qdrant:6333"]
    metrics_path: /metrics
